<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACK STATUS | 36th JULY LEGACY</title>
    <style>
        :root { 
            --accent-red: #ff4d4d; 
            --dark-bg: #0B0E11; 
            --card-bg: #1E2329; 
            --input-bg: #2B3139;
            --text-gray: #848e9c; 
        }
        
        body { 
            background: var(--dark-bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0; 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--accent-red); 
            padding: 40px; 
            border-radius: 15px; 
            display: inline-block; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h2 { 
            color: var(--accent-red); 
            margin-top: 0; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 22px;
        }

        p.desc { 
            color: var(--text-gray); 
            font-size: 14px; 
            margin-bottom: 25px; 
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: var(--input-bg); 
            color: #fff; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-red); }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-red); 
            border: none; 
            color: #fff;
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { 
            background: #cc0000; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3);
        }

        #resBox { 
            margin-top: 25px; 
            padding: 20px; 
            background: rgba(255, 77, 77, 0.05); 
            border: 1px dashed var(--accent-red); 
            display: none; 
            border-radius: 8px; 
            text-align: left;
        }

        #resBox h3 { 
            margin: 0 0 10px 0; 
            color: var(--accent-red); 
            font-size: 18px; 
        }

        #resBox p { 
            margin: 0; 
            color: #ddd; 
            font-size: 14px; 
            line-height: 1.6;
        }

        .back-link { 
            display: block; 
            margin-top: 25px; 
            color: var(--text-gray); 
            text-decoration: none; 
            font-size: 14px; 
        }

        .back-link:hover { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <h2>TRACK STATUS</h2>
        <p class="desc">Enter your Plot ID to check the activation status of your legacy.</p>
        
        <input type="number" id="plotID" placeholder="Enter Plot ID (e.g. 1-36)">
        <button onclick="checkStatus()">CHECK NOW</button>
        
        <div id="resBox">
            <h3 id="statusTitle"></h3>
            <p id="statusMsg"></p>
        </div>
        
        <a href="index.html" class="back-link">← Back to Memorial Map</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // Updated Firebase Configuration for 36th July Legacy
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            authDomain: "the-5k-elite-legacy.firebaseapp.com",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
            projectId: "the-5k-elite-legacy",
            storageBucket: "the-5k-elite-legacy.firebasestorage.app",
            messagingSenderId: "440824313752",
            appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkStatus() {
            const id = document.getElementById('plotID').value;
            const resBox = document.getElementById('resBox');
            const sTitle = document.getElementById('statusTitle');
            const sMsg = document.getElementById('statusMsg');

            if (!id) {
                alert("Please enter a Plot ID!");
                return;
            }

            // Using your new security rules node: royal_oasis_v2
            db.ref('royal_oasis_v2/orders/' + id).once('value', snapshot => {
                const data = snapshot.val();
                
                resBox.style.display = 'block';
                
                if (!data) {
                    sTitle.innerText = "NOT ACTIVATED";
                    sMsg.innerText = "Plot #" + id + " is currently vacant or awaiting payment verification. Please contact support via WhatsApp with your payment proof.";
                } else {
                    sTitle.innerText = "STATUS: PROCESSING";
                    sMsg.innerText = "Brand Name: " + data.name + "\nPlot ID: " + id + "\nYour request is in our system. Once verified, your logo will appear on the map.";
                }
            });
        }
    </script>
</body>
</html>
