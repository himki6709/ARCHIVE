<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RESERVE | 36th JULY LEGACY</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #0B0E11; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1E2329; padding: 30px; border-radius: 15px; border: 2px solid #ff4d4d; text-align: center; width: 350px; }
        .warning { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; padding: 15px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; border: 1px solid #ff4d4d; text-align: left; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2B3139; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #ff4d4d; color: #fff; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        #celeb { display: none; position: fixed; inset: 0; background: #ff4d4d; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>
    <div class="box" id="f-box">
        <div class="warning">
            ⚠️ <strong>নির্দেশনা:</strong><br>
            প্রতিটি প্লটের দাম <strong>৩৬ টাকা</strong>। পেমেন্ট করুন: <strong>০১৭৫৬২০৬২১৩ (বিকাশ/রকেট)</strong>। এরপর লোগো ও লিংক পাঠাতে হবে।
        </div>
        <h2 style="color:#ff4d4d;">RESERVE PLOT</h2>
        <input type="text" id="bn" placeholder="Your Name/Brand">
        <input type="number" id="pn" placeholder="Desired Plot ID">
        <button class="btn" onclick="submitOrder()">SUBMIT REQUEST</button>
        <a href="index.html" style="display:block; margin-top:15px; color:#888; text-decoration:none;">← Back</a>
    </div>

    <div id="celeb">
        <h1 style="font-size: 40px;">SUCCESS! 🎉</h1>
        <p>প্লটটি সংরক্ষিত হয়েছে। পেমেন্ট স্ক্রিনশট ও লোগো নিয়ে হোয়াটসঅ্যাপে যোগাযোগ করুন।</p>
        <button class="btn" style="background:#fff; color:#ff4d4d; width:200px;" onclick="location.href='https://wa.me/8801756206213'">WHATSAPP</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com/"});
        function submitOrder() {
            const n = document.getElementById('bn').value, p = document.getElementById('pn').value;
            if(!n || !p) return alert("সব তথ্য দিন!");
            firebase.database().ref('royal_oasis_v2/orders/'+p).set({name:n, plotID:p}).then(() => {
                document.getElementById('f-box').style.display='none';
                document.getElementById('celeb').style.display='flex';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            });
        }
    </script>
</body>
</html>
