<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL ARK | অমরত্বের পথে আপনার স্থান</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --primary-green: #1B4332; 
            --light-bg: #F0F7F4; 
            --accent-red: #D90429;
            --white: #FFFFFF;
        }

        body { 
            background: var(--light-bg); 
            color: var(--primary-green); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; text-align: center; 
        }

        /* Header Style */
        .header { padding: 60px 20px; }
        .title { 
            font-size: clamp(30px, 8vw, 55px); 
            font-weight: 900; 
            color: var(--primary-green); 
            letter-spacing: 3px; 
            margin: 0;
            text-transform: uppercase;
        }
        .description { 
            max-width: 600px; 
            margin: 20px auto; 
            font-size: 15px; 
            line-height: 1.6; 
            color: #555;
        }

        /* Counter Box */
        .impact-card {
            background: var(--white);
            max-width: 450px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .impact-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #888; }
        .impact-number { font-size: 35px; font-weight: 900; margin: 10px 0; }
        .impact-number span { color: var(--primary-green); }

        /* Map Section */
        .map-container {
            width: 95%;
            max-width: 400px; /* ক্যানভাস যেন স্মার্টফোনেও ঠিক থাকে */
            margin: 30px auto;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 20px;
            height: 600px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        canvas { display: block; margin: 0 auto; cursor: crosshair; }

        /* Order Section */
        .order-box {
            background: var(--primary-green);
            color: white;
            padding: 40px 20px;
            margin-top: 50px;
        }
        .form-card {
            max-width: 350px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
            outline: none;
        }
        .btn-order {
            width: 100%;
            padding: 15px;
            background: var(--white);
            color: var(--primary-green);
            border: none;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        #legacy-tooltip {
            position: absolute; display: none; background: #000; color: #fff;
            padding: 8px 12px; border-radius: 5px; font-size: 12px; z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 class="title">THE ETERNAL ARK</h1>
    <p class="description">
        অক্সিজেন শিল্ড পুনরুদ্ধারের একটি বিশ্বব্যাপী উদ্যোগ। ইতিহাসের পাতায় আপনার নাম খোদাই করুন এবং ভবিষ্যৎ প্রজন্মের জন্য একটি শ্বাসযোগ্য পৃথিবী নিশ্চিত করুন।
    </p>

    <div class="impact-card">
        <div class="impact-label">TOTAL IMPACT PROGRESS</div>
        <div class="impact-number"><span id="sold-count">0</span> / <span id="total-plots">36</span></div>
        <button class="btn-order" style="background:var(--primary-green); color:white; width:250px;">
            DONATE VIA PAYONEER (36 TK)
        </button>
    </div>
</div>

<div class="map-container">
    <canvas id="mainCanvas"></canvas>
</div>

<div class="order-box">
    <div class="form-card">
        <h3>RESERVE YOUR PLOT</h3>
        <p style="font-size: 13px; opacity: 0.8;">প্রতিটি প্লটের মূল্য মাত্র ৩৬ টাকা</p>
        <input type="text" id="uName" placeholder="আপনার নাম/ব্র্যান্ড">
        <input type="number" id="uPlot" placeholder="প্লট আইডি (১-৩৬...)">
        <button class="btn-order" onclick="reservePlot()">SUBMIT NOW</button>
    </div>
</div>

<div id="legacy-tooltip"></div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
    authDomain: "the-5k-elite-legacy.firebaseapp.com",
    databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
    projectId: "the-5k-elite-legacy",
    storageBucket: "the-5k-elite-legacy.firebasestorage.app",
    messagingSenderId: "440824313752",
    appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('royal_oasis_v2/live');

const cv = document.getElementById('mainCanvas'), ctx = cv.getContext('2d');
const tooltip = document.getElementById('legacy-tooltip');

// আপনার নির্দেশনা অনুযায়ী ২ গুণ বড় ব্লক সাইজ (৬০ পিক্সেল)
const blockSize = 60; 
const cols = 6; // ৬ কলামে ক্যানভাসটি লম্বালম্বি হবে
let pixels = {};

function render() {
    const totalOccupied = Object.keys(pixels).length;
    // ৩৬টি ফিলাপ হলে পরবর্তী ৩৬টি যুক্ত হবে
    const currentMax = Math.ceil((totalOccupied + 1) / 36) * 36;
    const rows = currentMax / cols;

    cv.width = cols * blockSize;
    cv.height = rows * blockSize;
    document.getElementById('total-plots').innerText = currentMax;

    // ক্লিয়ার এবং গ্রিড ড্রয়িং
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, cv.width, cv.height);

    // ঘরগুলো দৃশ্যমান করা
    ctx.strokeStyle = "#E0E0E0"; 
    ctx.lineWidth = 1;
    for (let i = 0; i <= cols; i++) {
        ctx.beginPath(); ctx.moveTo(i * blockSize, 0); ctx.lineTo(i * blockSize, cv.height); ctx.stroke();
    }
    for (let j = 0; j <= rows; j++) {
        ctx.beginPath(); ctx.moveTo(0, j * blockSize); ctx.lineTo(cv.width, j * blockSize); ctx.stroke();
    }

    // ইমেজ রেন্ডারিং
    Object.values(pixels).forEach(p => {
        const id = parseInt(p.plotID) - 1;
        const x = (id % cols) * blockSize;
        const y = Math.floor(id / cols) * blockSize;

        if (p.imageUrl) {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = p.imageUrl;
            img.onload = () => ctx.drawImage(img, x, y, blockSize, blockSize);
        }
    });
}

db.on('value', s => {
    pixels = s.val() || {};
    document.getElementById('sold-count').innerText = Object.keys(pixels).length;
    render();
});

function reservePlot() {
    const name = document.getElementById('uName').value;
    const plot = document.getElementById('uPlot').value;
    if(!name || !plot) return alert("তথ্য পূরণ করুন!");

    firebase.database().ref('royal_oasis_v2/orders/' + plot).set({ name, plotID: plot })
    .then(() => {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        alert("আবেদন সফল! হোয়াটসঅ্যাপে যোগাযোগ করুন।");
        window.location.href = "https://wa.me/8801756206213";
    });
}

// মাউস টুলটিপ
cv.addEventListener('mousemove', (e) => {
    const rect = cv.getBoundingClientRect();
    const x = (e.clientX - rect.left) / (rect.width / cv.width) * cv.width;
    const y = (e.clientY - rect.top) / (rect.height / cv.height) * cv.height;
    let found = false;

    Object.values(pixels).forEach(p => {
        const id = parseInt(p.plotID) - 1;
        const px = (id % cols) * blockSize, py = Math.floor(id / cols) * blockSize;
        if (x >= px && x <= px + blockSize && y >= py && y <= py + blockSize) {
            tooltip.style.display = 'block';
            tooltip.style.left = e.pageX + 15 + 'px'; tooltip.style.top = e.pageY + 15 + 'px';
            tooltip.innerHTML = `<strong>${p.name}</strong><br>Plot #${p.plotID}`;
            found = true;
        }
    });
    if (!found) tooltip.style.display = 'none';
});
</script>

</body>
</html>
